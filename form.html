<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WDD 131 – Product Review Form. Submit a review for one of our featured products.">
  <meta name="author" content="John Russelle Domingo">

  <!-- Google Fonts: Montserrat (headings) + Roboto (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Form styles -->
  <link rel="stylesheet" href="styles/form.css">

  <!-- Populate product select options -->
  <script src="scripts/form.js" defer></script>

  <title>Product Review | WDD 131</title>
</head>
<body>

  <!-- Site header -->
  <header>
    <h1>&#9881; Product Review</h1>
  </header>

  <main>
    <h2>Submit Your Review</h2>

    <!--
      form method="get" so the action works on GitHub Pages (no server).
      action points to the confirmation page.
    -->
    <form method="get" action="review.html" class="form-card" novalidate>

      <!-- 1. Product Name (dynamic select populated by form.js) -->
      <div class="field-group">
        <label for="product-name">Product Name</label>
        <select id="product-name" name="product-name" required>
          <!-- Placeholder: disabled so the user must choose a real product -->
          <option value="" disabled selected>Select a Product ...</option>
          <!-- Remaining options injected by form.js -->
        </select>
      </div>

      <!-- 2. Overall Rating (1–5 stars via radio buttons) -->
      <fieldset class="rating-fieldset">
        <legend>Overall Rating</legend>
        <!-- Reversed in DOM for CSS :checked ~ sibling trick; visually correct via flex-row-reverse -->
        <div class="star-group" role="radiogroup" aria-label="Rating from 1 to 5 stars">
          <input type="radio" id="star5" name="rating" value="5" required>
          <label for="star5" title="5 stars">&#9733;</label>

          <input type="radio" id="star4" name="rating" value="4">
          <label for="star4" title="4 stars">&#9733;</label>

          <input type="radio" id="star3" name="rating" value="3">
          <label for="star3" title="3 stars">&#9733;</label>

          <input type="radio" id="star2" name="rating" value="2">
          <label for="star2" title="2 stars">&#9733;</label>

          <input type="radio" id="star1" name="rating" value="1">
          <label for="star1" title="1 star">&#9733;</label>
        </div>
      </fieldset>

      <!-- 3. Date of Installation -->
      <div class="field-group">
        <label for="install-date">Date of Installation</label>
        <input type="date" id="install-date" name="install-date" required>
      </div>

      <!-- 4. Useful Features (checkboxes – check all that apply) -->
      <fieldset class="rating-fieldset">
        <legend>Useful Features <span class="optional">(check all that apply)</span></legend>
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="feat-easy-install" name="features" value="easy-install">
            <label for="feat-easy-install">Easy to install</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="feat-durable" name="features" value="durable">
            <label for="feat-durable">Durable &amp; long-lasting</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="feat-value" name="features" value="value-for-money">
            <label for="feat-value">Good value for money</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="feat-reliable" name="features" value="reliable">
            <label for="feat-reliable">Reliable performance</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="feat-support" name="features" value="good-support">
            <label for="feat-support">Good customer support</label>
          </div>
        </div>
      </fieldset>

      <!-- 5. Written Review (optional textarea) -->
      <div class="field-group">
        <label for="written-review">
          Written Review <span class="optional">(optional)</span>
        </label>
        <textarea id="written-review" name="written-review" placeholder="Share your experience with this product..."></textarea>
      </div>

      <!-- 6. User Name (optional text input) -->
      <div class="field-group">
        <label for="user-name">
          Your Name <span class="optional">(optional)</span>
        </label>
        <input type="text" id="user-name" name="user-name" placeholder="e.g. Jane Smith">
      </div>

      <!-- 7. Submit button -->
      <input type="submit" class="btn-submit" value="Submit Review">

    </form>
  </main>

  <!-- Common footer -->
  <footer>
    <p>&copy; <span id="currentyear"></span> John Russelle Domingo &mdash; Philippines</p>
    <p id="lastModified"></p>
  </footer>

  <!-- Footer dates -->
  <script>
    document.getElementById('currentyear').textContent = new Date().getFullYear();
    document.getElementById('lastModified').textContent = 'Last Modified: ' + document.lastModified;
  </script>

</body>
</html>
