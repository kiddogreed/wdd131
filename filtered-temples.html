<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="W04 Assignment: Picture Album Enhancement. A sample HTML document with media queries and JavaScript filtering.">
  <meta name="author" content="John Russelle Domingo">

   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

   <link rel="stylesheet" href="styles/filtered-temples.css">
   <link rel="stylesheet" href="styles/filtered-temples-large.css">
  <script src="scripts/filtered-temples.js" defer></script>
  
  <title>Temple Album Filter</title>
</head>
<body>
  <header>
    <h1>Temple Album Filter</h1>
    <nav>
      <!-- Hamburger button: visible only on mobile, toggles nav menu open/closed -->
      <button id="hamburger-btn" class="hamburger" aria-label="Toggle navigation menu" aria-expanded="false">&#9776;</button>
      <ul>
        <!-- updated navigation menu with data-filter attributes for JavaScript filtering -->
        <li><a href="#" data-filter="home">Home</a></li>
        <li><a href="#" data-filter="old">Old</a></li>
        <li><a href="#" data-filter="new">New</a></li>
        <li><a href="#" data-filter="large">Large</a></li>
        <li><a href="#" data-filter="small">Small</a></li>
      </ul>
    </nav>
  </header>
  <!-- load the temple data from the JSON file and create the temple cards -->
  <main>
    <div class="temple-cards"></div>
  </main>
  <footer>
    <p>&copy; <span id="currentyear"></span> John Russelle Domingo - Philippines</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
