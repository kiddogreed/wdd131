<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180"
     role="img" aria-label="Web scraping data flow: Your Script sends HTTP GET to Web Server, receives HTML Response, feeds HTML Parser, outputs Clean Data">

  <!-- Background -->
  <rect width="900" height="180" fill="#0d0630"/>

  <!-- ── Box 1: Your Script ── -->
  <rect x="30" y="55" width="140" height="70" rx="8" fill="#18314f" stroke="#384e77" stroke-width="2"/>
  <text x="100" y="84"  text-anchor="middle" fill="#8bbeb2" font-family="Montserrat,sans-serif" font-size="13" font-weight="bold">Your Script</text>
  <text x="100" y="103" text-anchor="middle" fill="#e6f9af" font-family="Roboto,sans-serif"     font-size="11">Python / Node.js</text>

  <!-- ── Arrow 1 ── -->
  <line x1="171" y1="90" x2="218" y2="90" stroke="#8bbeb2" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="218,85 230,90 218,95" fill="#8bbeb2"/>
  <text x="200" y="78" text-anchor="middle" fill="#8bbeb2" font-family="Roboto,sans-serif" font-size="10">GET request</text>

  <!-- ── Box 2: Web Server ── -->
  <rect x="230" y="55" width="140" height="70" rx="8" fill="#18314f" stroke="#384e77" stroke-width="2"/>
  <text x="300" y="84"  text-anchor="middle" fill="#8bbeb2" font-family="Montserrat,sans-serif" font-size="13" font-weight="bold">Web Server</text>
  <text x="300" y="103" text-anchor="middle" fill="#e6f9af" font-family="Roboto,sans-serif"     font-size="11">example.com</text>

  <!-- ── Arrow 2 ── -->
  <line x1="371" y1="90" x2="418" y2="90" stroke="#8bbeb2" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="418,85 430,90 418,95" fill="#8bbeb2"/>
  <text x="400" y="78" text-anchor="middle" fill="#8bbeb2" font-family="Roboto,sans-serif" font-size="10">HTML response</text>

  <!-- ── Box 3: HTML Parser ── -->
  <rect x="430" y="55" width="140" height="70" rx="8" fill="#18314f" stroke="#384e77" stroke-width="2"/>
  <text x="500" y="84"  text-anchor="middle" fill="#8bbeb2" font-family="Montserrat,sans-serif" font-size="13" font-weight="bold">HTML Parser</text>
  <text x="500" y="103" text-anchor="middle" fill="#e6f9af" font-family="Roboto,sans-serif"     font-size="11">BeautifulSoup</text>

  <!-- ── Arrow 3 ── -->
  <line x1="571" y1="90" x2="618" y2="90" stroke="#8bbeb2" stroke-width="2" stroke-dasharray="4 2"/>
  <polygon points="618,85 630,90 618,95" fill="#8bbeb2"/>
  <text x="600" y="78" text-anchor="middle" fill="#8bbeb2" font-family="Roboto,sans-serif" font-size="10">extract data</text>

  <!-- ── Box 4: Clean Data ── -->
  <rect x="630" y="55" width="140" height="70" rx="8" fill="#18314f" stroke="#52b788" stroke-width="2"/>
  <text x="700" y="84"  text-anchor="middle" fill="#8bbeb2" font-family="Montserrat,sans-serif" font-size="13" font-weight="bold">Clean Data</text>
  <text x="700" y="103" text-anchor="middle" fill="#e6f9af" font-family="Roboto,sans-serif"     font-size="11">CSV / JSON</text>

  <!-- ── Decorative spider legs ── -->
  <circle cx="840" cy="90" r="5" fill="#384e77"/>
  <circle cx="860" cy="90" r="5" fill="#384e77"/>
  <circle cx="880" cy="90" r="5" fill="#384e77"/>

  <!-- ── Label bar ── -->
  <text x="450" y="158" text-anchor="middle" fill="#8bbeb2" font-family="Montserrat,sans-serif" font-size="11" opacity="0.6" letter-spacing="2">STATIC WEB SCRAPING DATA FLOW</text>
</svg>
